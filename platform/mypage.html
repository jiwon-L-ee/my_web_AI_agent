<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마이페이지 | 맞불</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .btn-del-post {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.6); border: none; border-radius: 6px;
      padding: 5px 9px; cursor: pointer; font-size: 0.85rem;
      color: #fff; transition: background 0.15s;
    }
    .btn-del-post:hover { background: var(--accent); }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="logo-flame-sm" width="18" height="24" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgNav" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgNav)"/></svg>
      <span class="logo-wordmark">맞불</span>
    </a>
    <div class="nav-center">
      <a href="index.html" class="nav-link" data-cat="밸런스게임">홈</a>
      <a href="index.html?cat=토론" class="nav-link" data-cat="토론">토론</a>
      <a href="index.html?cat=퀴즈" class="nav-link" data-cat="퀴즈">퀴즈</a>
      <a href="index.html?cat=커뮤니티" class="nav-link" data-cat="커뮤니티">커뮤니티</a>
      <a href="index.html?cat=정보" class="nav-link" data-cat="정보">정보</a>
    </div>
    <div class="nav-auth" id="navAuth">
      <a href="login.html" class="btn-login">로그인</a>
    </div>
  </div>
</nav>

<div class="page">
  <!-- Profile banner -->
  <div class="profile-banner">
    <img id="profileAvatar" class="profile-avatar-lg" src="" alt="">
    <div id="profileAvatarPlaceholder" class="profile-avatar-lg avatar-placeholder" style="display:none"></div>
    <div class="profile-info">
      <div id="profileName" class="profile-name">로딩 중...</div>
      <div id="profileBio" class="profile-bio"></div>
      <div class="profile-actions">
        <button id="editProfileBtn" class="btn-edit-profile">프로필 수정</button>
        <button id="signOutBtn" class="btn-cancel" style="font-size:0.85rem;padding:7px 14px">로그아웃</button>
      </div>
    </div>
  </div>

  <!-- 만들기 섹션 -->
  <div class="create-section">
    <a href="create.html" class="btn-create-lg">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
      새 논쟁 만들기
    </a>
    <p class="create-hint">밸런스게임, OX퀴즈, 테스트를<br>만들어 공유하세요</p>
  </div>

  <!-- Stats -->
  <div class="stats-grid">
    <div class="stat-card"><div id="statPosts" class="stat-val">—</div><div class="stat-label">내 게시물</div></div>
    <div class="stat-card"><div id="statViews" class="stat-val">—</div><div class="stat-label">전체 조회수</div></div>
    <div class="stat-card"><div id="statLikes" class="stat-val">—</div><div class="stat-label">받은 좋아요</div></div>
    <div class="stat-card"><div id="statFollowers" class="stat-val">—</div><div class="stat-label">팔로워</div></div>
  </div>

  <!-- My posts -->
  <div class="section-title">내 게시물</div>
  <div class="card-grid" id="myPostsGrid">
    <div style="grid-column:1/-1"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </div>
</div>

<!-- Edit profile modal -->
<div id="editModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h2>프로필 수정</h2>
    <form id="editProfileForm">
      <div class="form-group">
        <label class="form-label" for="editUsername">이름</label>
        <input id="editUsername" class="form-input" type="text" maxlength="30" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="editBio">자기소개</label>
        <textarea id="editBio" class="form-textarea" maxlength="200" placeholder="자기소개를 입력하세요."></textarea>
      </div>
      <div class="modal-actions">
        <button type="button" id="modalCancelBtn" class="btn-cancel">취소</button>
        <button type="submit" id="saveProfileBtn" class="btn-submit">저장</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/mypage.js"></script>
</body>
</html>
