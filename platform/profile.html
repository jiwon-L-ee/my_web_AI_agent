<div class="page">
  <div id="profileLoading" class="spinner-wrap"><div class="spinner"></div></div>

  <div id="profileContent" style="display:none">

          </div>
        </div>

    </div>

    <!-- Stats -->
    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat-card"><div id="statPosts" class="stat-val">—</div><div class="stat-label">게시물</div></div>
      <div class="stat-card"><div id="statFollowers" class="stat-val">—</div><div class="stat-label">팔로워</div></div>
      <div class="stat-card"><div id="statFollowing" class="stat-val">—</div><div class="stat-label">팔로잉</div></div>
    </div>

    <div class="card-grid" id="userPostsGrid">
      <div style="grid-column:1/-1"><div class="spinner-wrap"><div class="spinner"></div></div></div>
    </div>
  </div>

  (function() {
    if (localStorage.getItem('matbul-theme') === 'light') document.body.classList.add('light-mode');
    document.getElementById('themeToggle')?.addEventListener('click', function() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('matbul-theme', isLight ? 'light' : 'dark');
    });
  })();
</script>
