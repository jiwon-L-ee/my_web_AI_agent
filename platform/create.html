    <a href="index.html" class="nav-logo">
      <svg class="logo-flame-sm" width="18" height="24" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgNav" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgNav)"/></svg>

<div class="page-narrow">
  <form class="form-card" id="createForm">
    <h1>새 테스트 만들기</h1>

    <div class="form-group">
      <label class="form-label" for="titleInput">제목 *</label>
      <input id="titleInput" class="form-input" type="text" placeholder="ex) 내 얼굴상은 아랍상? 두부상?" required maxlength="80">
    </div>

    <div class="form-group">
      <label class="form-label" for="categorySelect">카테고리 *</label>
      <select id="categorySelect" class="form-select">
        <option value="밸런스게임" selected>밸런스게임</option>
        <option value="OX퀴즈">OX퀴즈</option>
        <option value="테스트">테스트</option>
      </select>
    </div>

    <div class="form-group">
      <label class="form-label" for="descInput">설명</label>
      <textarea id="descInput" class="form-textarea" placeholder="테스트에 대한 간단한 소개를 입력하세요." maxlength="500"></textarea>
    </div>

    <div class="form-group" id="optionAGroup">
      <label for="optionAInput" id="optionALabel" class="form-label">A 선택지</label>
      <input id="optionAInput" class="form-input" maxlength="100" placeholder="A 선택지 입력">
    </div>

    <div class="form-group" id="optionBGroup">
      <label for="optionBInput" id="optionBLabel" class="form-label">B 선택지</label>
      <input id="optionBInput" class="form-input" maxlength="100" placeholder="B 선택지 입력">
    </div>

    <div class="form-group" id="modelUrlGroup">
      <label class="form-label" for="modelUrlInput">Teachable Machine 모델 URL *</label>
      <input id="modelUrlInput" class="form-input" type="url" placeholder="https://teachablemachine.withgoogle.com/models/XXXXX/">
      <p class="form-hint" id="modelUrlHint">Teachable Machine에서 모델을 학습시킨 후 공유 링크를 붙여넣어 주세요.</p>
    </div>

    <div class="form-group">
      <label class="form-label" for="thumbInput">썸네일 이미지 (선택)</label>
      <input id="thumbInput" class="form-input" type="file" accept="image/*" style="padding:8px">
      <div id="thumbPreview" class="thumb-preview">
        <img id="thumbPreviewImg" alt="thumbnail preview">
      </div>
      <p class="form-hint">권장 비율: 16:9, 최대 2MB</p>
    </div>

    <div class="form-actions">
      <button type="button" id="cancelBtn" class="btn-cancel">취소</button>
      <button type="submit" id="submitBtn" class="btn-submit">게시하기</button>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/create.js"></script>
</body>
</html>
