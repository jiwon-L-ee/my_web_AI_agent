<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀번호 재설정 | 맞불</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-wrap { position: relative; overflow: hidden; }
    .login-wrap::before {
      content: '';
      position: absolute; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(233,69,96,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 20%, rgba(245,166,35,0.06) 0%, transparent 55%);
      pointer-events: none;
    }
    .login-card { width: 100%; max-width: 420px; text-align: left; position: relative; z-index: 1; }
    .auth-logo {
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; margin-bottom: 32px;
    }
    .auth-logo-title {
      font-size: 2rem; font-weight: 900; letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 0%, #f5a623 50%, #e94560 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    .auth-logo-sub { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.03em; }
    .auth-page-title { font-size: 1.25rem; font-weight: 700; margin-bottom: 8px; text-align: center; }
    .auth-page-desc { font-size: 0.85rem; color: var(--text-muted); text-align: center; margin-bottom: 28px; line-height: 1.6; }
    .auth-msg {
      font-size: 0.82rem; margin-top: 10px; min-height: 18px;
      display: none; padding: 8px 12px; border-radius: 6px;
    }
    .auth-msg.error {
      display: block; color: #ff6b6b;
      background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2);
    }
    .auth-msg.success {
      display: block; color: #4caf8a;
      background: rgba(76,175,138,0.08); border: 1px solid rgba(76,175,138,0.2);
    }
    .auth-actions { margin-top: 20px; }
    .auth-actions .btn-submit { width: 100%; }
    .auth-switch {
      text-align: center; margin-top: 20px;
      font-size: 0.82rem; color: var(--text-muted);
    }
    .auth-switch a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; }
    #invalidState {
      text-align: center;
      padding: 20px 0;
      color: var(--text-muted);
      font-size: 0.9rem;
      line-height: 1.7;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="logo-flame-sm" width="18" height="24" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgNav" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgNav)"/></svg>
      <span class="logo-wordmark">맞불</span>
    </a>
    <div class="nav-center">
      <a href="index.html" class="nav-link" data-cat="밸런스게임">홈</a>
      <a href="index.html?cat=토론" class="nav-link" data-cat="토론">토론</a>
      <a href="index.html?cat=퀴즈" class="nav-link" data-cat="퀴즈">퀴즈</a>
      <a href="index.html?cat=커뮤니티" class="nav-link" data-cat="커뮤니티">커뮤니티</a>
      <a href="ranking.html" class="nav-link">랭킹</a>
    </div>
    <div class="nav-auth" id="navAuth"></div>
    <button class="btn-theme-toggle" id="themeToggle" aria-label="테마 전환">
      <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</nav>

<div class="login-wrap">
  <div class="login-card">

    <div class="auth-logo">
      <svg width="44" height="56" viewBox="0 0 18 24" fill="none" aria-hidden="true">
        <defs><linearGradient id="lgCard" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs>
        <path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgCard)"/>
      </svg>
      <span class="auth-logo-title">맞불</span>
      <span class="auth-logo-sub">사소한 고집의 끝</span>
    </div>

    <!-- 유효하지 않은 링크 상태 -->
    <div id="invalidState" style="display:none">
      유효하지 않거나 만료된 링크입니다.<br>
      <a href="forgot-password.html" style="color:var(--accent)">비밀번호 찾기</a>를 다시 시도해주세요.
    </div>

    <!-- 비밀번호 재설정 폼 -->
    <div id="resetFormWrap">
      <div class="auth-page-title">새 비밀번호 설정</div>
      <div class="auth-page-desc">사용할 새 비밀번호를 입력해주세요.</div>

      <form id="resetForm" novalidate>
        <div class="form-group">
          <label class="form-label" for="newPassword">새 비밀번호</label>
          <input id="newPassword" class="form-input" type="password" placeholder="8자 이상" autocomplete="new-password" minlength="8" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="newPasswordConfirm">비밀번호 확인</label>
          <input id="newPasswordConfirm" class="form-input" type="password" placeholder="비밀번호 재입력" autocomplete="new-password" required>
        </div>
        <div id="resetMsg" class="auth-msg"></div>
        <div class="auth-actions">
          <button type="submit" id="resetBtn" class="btn-submit">비밀번호 변경</button>
        </div>
      </form>

      <div class="auth-switch">
        <a href="login.html">← 로그인으로 돌아가기</a>
      </div>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  initAuth();

  // Supabase는 이메일 링크 클릭 시 URL 해시에 access_token을 포함해 리다이렉트.
  // onAuthStateChange에서 PASSWORD_RECOVERY 이벤트를 수신해야 유효한 세션.
  let recoveryReady = false;

  db.auth.onAuthStateChange((event) => {
    if (event === 'PASSWORD_RECOVERY') {
      recoveryReady = true;
    }
  });

  // 해시가 없으면 유효하지 않은 접근
  (function() {
    const hash = location.hash;
    if (!hash || !hash.includes('access_token')) {
      document.getElementById('resetFormWrap').style.display = 'none';
      document.getElementById('invalidState').style.display = 'block';
    }
  })();

  document.getElementById('resetForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const msg = document.getElementById('resetMsg');
    const btn = document.getElementById('resetBtn');
    const password = document.getElementById('newPassword').value;
    const confirm = document.getElementById('newPasswordConfirm').value;

    msg.className = 'auth-msg';

    if (password.length < 8) {
      msg.textContent = '비밀번호는 8자 이상이어야 합니다.';
      msg.className = 'auth-msg error';
      return;
    }
    if (password !== confirm) {
      msg.textContent = '비밀번호가 일치하지 않습니다.';
      msg.className = 'auth-msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = '변경 중...';
    try {
      await updatePassword(password);
      msg.textContent = '비밀번호가 변경되었습니다. 잠시 후 로그인 페이지로 이동합니다.';
      msg.className = 'auth-msg success';
      document.getElementById('resetForm').style.display = 'none';
      setTimeout(() => { location.href = 'login.html'; }, 2500);
    } catch (err) {
      msg.textContent = err.message || '변경에 실패했습니다. 링크가 만료되었을 수 있습니다.';
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = '비밀번호 변경';
    }
  });

  (function() {
    if (localStorage.getItem('matbul-theme') === 'light') document.body.classList.add('light-mode');
    document.getElementById('themeToggle').addEventListener('click', function() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('matbul-theme', isLight ? 'light' : 'dark');
    });
  })();
</script>
