<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>게시물 | 맞불</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .btn-del-post {
      position: absolute; top: 10px; right: 10px;
      background: rgba(0,0,0,0.6); border: none; border-radius: 6px;
      padding: 5px 9px; cursor: pointer; font-size: 0.85rem;
      color: #fff; transition: background 0.15s;
    }
    .btn-del-post:hover { background: var(--accent); }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="logo-flame-sm" width="18" height="24" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgNav" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgNav)"/></svg>
      <span class="logo-wordmark">맞불</span>
    </a>
    <div class="nav-center">
      <a href="index.html" class="nav-link" data-cat="밸런스게임">홈</a>
      <a href="index.html?cat=토론" class="nav-link" data-cat="토론">토론</a>
      <a href="index.html?cat=퀴즈" class="nav-link" data-cat="퀴즈">퀴즈</a>
      <a href="index.html?cat=커뮤니티" class="nav-link" data-cat="커뮤니티">커뮤니티</a>
      <a href="index.html?cat=정보" class="nav-link" data-cat="정보">정보</a>
    </div>
    <div class="nav-auth" id="navAuth">
      <a href="login.html" class="btn-login">로그인</a>
    </div>
  </div>
</nav>

<div class="page-narrow">
  <!-- Loading -->
  <div id="postLoading" class="spinner-wrap"><div class="spinner"></div></div>

  <!-- Post content -->
  <div id="postContent" style="display:none">
    <div class="post-header">
      <div id="postBadge" class="post-badge"></div>
      <h1 id="postTitle" class="post-title"></h1>
      <div class="post-meta-row">
        <a id="authorLink" href="#" class="post-author-info">
          <img id="authorAvatar" class="post-author-avatar" src="" alt="" style="display:none">
          <span id="authorAvatarPlaceholder" class="post-author-avatar" style="display:none;align-items:center;justify-content:center;background:var(--surface2);font-size:0.8rem;font-weight:700;"></span>
          <div>
            <div id="authorName" class="post-author-name"></div>
            <div id="postTime" class="post-author-time"></div>
          </div>
        </a>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="post-stats">
            <span class="post-stat">👁 <span id="viewCount">0</span></span>
            <span class="post-stat">💬 <span id="commentCount">0</span></span>
          </div>
          <button id="likeBtn" class="like-btn">🤍 <span id="likeCount">0</span></button>
          <button id="deleteBtn" style="display:none" class="btn-del-post" title="삭제">🗑️</button>
        </div>
      </div>
    </div>

    <p id="postDescription" class="post-description" style="display:none"></p>

    <!-- Vote Section (밸런스게임 / OX퀴즈) -->
    <div id="voteSection" style="display:none">
      <div class="vote-section">
        <div class="vote-options">
          <div class="vote-choice" id="voteChoiceA"></div>
          <div class="vote-vs">VS</div>
          <div class="vote-choice" id="voteChoiceB"></div>
        </div>
        <div class="vote-btns">
          <button class="vote-btn vote-btn-a" data-choice="A">A 투표</button>
          <button class="vote-btn vote-btn-b" data-choice="B">B 투표</button>
        </div>
        <div class="vote-bar-wrap">
          <div class="vote-bar-a" id="voteBarA" style="width:50%"></div>
          <div class="vote-bar-b" id="voteBarB" style="width:50%"></div>
        </div>
        <div class="vote-counts">
          <span id="voteCountA">0표</span>
          <span id="voteCountB">0표</span>
        </div>
      </div>
    </div>

    <!-- Test Player -->
    <div id="playerSection">
      <div class="player-section">
        <div class="player-title">🎯 테스트 해보기</div>

        <div id="uploadArea" class="upload-area">
          <div class="upload-icon">📷</div>
          <div class="upload-text">이미지를 업로드하거나 드래그하세요</div>
          <div class="upload-hint">JPG, PNG, GIF 지원</div>
        </div>
        <input type="file" id="fileInput" accept="image/*" style="display:none">

        <div id="previewArea" class="preview-area" style="display:none">
          <img id="previewImg" alt="preview">
          <button id="resetImgBtn" class="btn-reset-img">다른 이미지 선택</button>
        </div>

        <button id="analyzeBtn" class="btn-analyze" disabled>분석하기</button>

        <div id="playerLoading" class="player-loading" style="display:none">
          <div class="spinner" style="margin:0 auto 10px"></div>
          <p>분석 중...</p>
        </div>

        <div id="resultSection" class="result-section" style="display:none">
          <div class="result-card">
            <div class="result-label">판정 결과</div>
            <div id="resultClass" class="result-class"></div>
            <div class="confidence-bar-wrap">
              <div id="confidenceBar" class="confidence-bar" style="width:0%"></div>
            </div>
            <div id="confidenceText" class="confidence-text"></div>
            <div id="allScores" class="all-scores"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Comments -->
    <div class="comments-section">
      <div class="comments-title">댓글 <span id="commentCount2"></span></div>

      <div id="commentFormArea">
        <!-- Filled by post.js based on auth state -->
      </div>

      <div id="commentList" class="comment-list"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  // Setup comment form area based on auth
  async function setupCommentForm() {
    const user = await getUser();
    const area = document.getElementById('commentFormArea');
    if (user) {
      area.innerHTML = `
        <div class="comment-form">
          <textarea id="commentInput" placeholder="댓글을 입력하세요 (Ctrl+Enter로 제출)"></textarea>
          <button id="commentSubmitBtn" class="btn-comment">작성</button>
        </div>`;
    } else {
      const loginHref = 'login.html?next=' + encodeURIComponent(location.href);
      area.innerHTML = `<p class="login-to-comment"><a href="${loginHref}">로그인</a>하면 댓글을 작성할 수 있습니다.</p>`;
    }
  }
  setupCommentForm();
</script>
<script src="js/post.js"></script>
</body>
</html>
