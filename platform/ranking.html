<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>랭킹 | 맞불</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet">
  <style>
    .page-narrow { max-width: 860px; }

    /* ── 헤더 ── */
    .ranking-header {
      text-align: center;
      padding: 48px 0 36px;
    }
    .ranking-header-label {
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 12px;
    }
    .ranking-header-title {
      font-family: 'Black Han Sans', var(--font);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--text);
      text-shadow: 0 0 40px rgba(233,69,96,0.25);
      margin-bottom: 8px;
    }
    .ranking-header-sub {
      font-size: 0.85rem; color: var(--text-muted);
    }

    /* ── 탭 ── */
    .rank-tabs {
      display: flex; gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 5px;
      margin-bottom: 28px;
      overflow-x: auto;
    }
    .rank-tab {
      flex: 1; min-width: 80px;
      padding: 9px 10px;
      border-radius: 8px; border: none;
      background: transparent; cursor: pointer;
      font-family: var(--font); font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .rank-tab.active {
      background: var(--surface2);
      color: var(--text);
    }

    /* ── 테이블 ── */
    .rank-table { width: 100%; border-collapse: collapse; }
    .rank-table th {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--text-muted);
      padding: 0 16px 12px;
      text-align: left;
    }
    .rank-table th.num { text-align: right; }
    .rank-row {
      border-top: 1px solid var(--border);
      transition: background 0.12s;
    }
    .rank-row:hover { background: var(--surface2); }
    .rank-row td { padding: 14px 16px; vertical-align: middle; }

    /* 순위 번호 */
    .rank-no {
      font-size: 0.85rem; font-weight: 800;
      color: var(--text-muted); width: 40px;
      text-align: center;
    }
    .rank-no.top1 { color: #ffd700; font-size: 1.1rem; }
    .rank-no.top2 { color: #c0c0c0; font-size: 1rem; }
    .rank-no.top3 { color: #cd7f32; font-size: 1rem; }

    /* 유저 정보 */
    .rank-user {
      display: flex; align-items: center; gap: 12px;
    }
    .rank-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      object-fit: cover; flex-shrink: 0;
      background: var(--surface2);
    }
    .rank-avatar-placeholder {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--surface2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.8rem; font-weight: 700; color: var(--text-muted);
    }
    .rank-username {
      font-weight: 600; font-size: 0.93rem; color: var(--text);
      text-decoration: none;
    }
    a.rank-username:hover { color: var(--accent); }

    /* 점수 */
    .rank-score {
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 700; font-size: 0.93rem;
      color: var(--text);
    }
    .rank-score.highlight {
      color: var(--accent);
      text-shadow: 0 0 12px rgba(233,69,96,0.3);
    }

    /* 서브 스탯 (전체 탭에서 표시) */
    .rank-sub-stats {
      display: flex; gap: 16px;
      font-size: 0.75rem; color: var(--text-muted);
      margin-top: 2px;
    }
    .rank-sub-stat { display: flex; gap: 4px; align-items: center; }

    /* 로딩 / 빈 상태 */
    .rank-loading, .rank-empty {
      text-align: center; padding: 60px 0;
      color: var(--text-muted); font-size: 0.9rem;
    }

    /* 내 랭킹 배너 */
    .my-rank-banner {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 14px;
      font-size: 0.88rem; color: var(--text-muted);
    }
    .my-rank-banner strong { color: var(--text); font-size: 1rem; }
    .my-rank-banner .my-rank-no {
      font-family: 'Black Han Sans', var(--font);
      font-size: 1.6rem; color: var(--accent);
      flex-shrink: 0; min-width: 40px;
    }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="logo-flame-sm" width="18" height="24" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgNav" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgNav)"/></svg>
      <span class="logo-wordmark">맞불</span>
    </a>
    <div class="nav-center">
      <a href="index.html" class="nav-link" data-cat="밸런스게임">홈</a>
      <a href="index.html?cat=토론" class="nav-link" data-cat="토론">토론</a>
      <a href="index.html?cat=퀴즈" class="nav-link" data-cat="퀴즈">퀴즈</a>
      <a href="index.html?cat=커뮤니티" class="nav-link" data-cat="커뮤니티">커뮤니티</a>
      <a href="ranking.html" class="nav-link active">랭킹</a>
    </div>
    <div class="nav-auth" id="navAuth">
      <a href="login.html" class="btn-login">로그인</a>

    <button class="btn-theme-toggle" id="themeToggle" aria-label="테마 전환">
      <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
    </button>
  </div>
</nav>

<div class="page-narrow">
  <div class="ranking-header">
    <div class="ranking-header-label">맞불 랭킹</div>
    <div class="ranking-header-title">명예의 전당</div>
    <div class="ranking-header-sub">크레딧·좋아요·설득·팔로워로 매기는 맞불 랭킹</div>
  </div>

  <!-- 내 순위 배너 (로그인 시) -->
  <div id="myRankBanner" class="my-rank-banner" style="display:none">
    <div class="my-rank-no" id="myRankNo">—</div>
    <div>
      <strong id="myRankLabel">내 종합 순위</strong>
      <div id="myRankDesc"></div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="rank-tabs" role="tablist">
    <button class="rank-tab active" data-tab="overall" role="tab">종합</button>
    <button class="rank-tab" data-tab="credits" role="tab">크레딧</button>
    <button class="rank-tab" data-tab="likes" role="tab">좋아요</button>
    <button class="rank-tab" data-tab="persuasion" role="tab">설득함</button>
    <button class="rank-tab" data-tab="followers" role="tab">팔로워</button>
  </div>

  <!-- 테이블 -->
  <div id="rankingContainer">
    <div class="rank-loading">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- 페이지네이션 -->
  <div id="rankPagination"></div>
</div>

<footer style="margin-top:80px;padding:40px 24px;border-top:1px solid var(--border);text-align:center;">
  <div class="footer-logo">
    <svg width="16" height="20" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgFoot" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgFoot)"/></svg>
    <span>맞불</span>
  </div>
  <p style="font-size:0.78rem;color:var(--text-muted);margin-top:8px">사소한 고집의 끝</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/notifications.js"></script>
<script src="js/ranking.js"></script>
<script>
  (function() {
    if (localStorage.getItem('matbul-theme') === 'light') document.body.classList.add('light-mode');
    document.getElementById('themeToggle').addEventListener('click', function() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('matbul-theme', isLight ? 'light' : 'dark');
    });
  })();
</script>
</body>
</html>
