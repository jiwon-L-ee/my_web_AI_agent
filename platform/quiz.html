<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퀴즈 | 맞불</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* ── Quiz Player ─────────────────────────────────────── */
    .quiz-header {
      padding: 28px 0 20px;
    }
    .quiz-progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }
    .quiz-progress-bar {
      flex: 1;
      height: 4px;
      background: var(--surface2);
      border-radius: 2px;
      overflow: hidden;
    }
    .quiz-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .quiz-progress-text {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
      white-space: nowrap;
      letter-spacing: 0.5px;
    }
    .quiz-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .quiz-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text);
      margin: 0 0 16px;
      line-height: 1.4;
    }
    .quiz-type-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 16px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.4px;
    }
    .quiz-type-badge.type-ox        { background: rgba(245,166,35,0.15);  color: var(--orange); border: 1px solid rgba(245,166,35,0.3); }
    .quiz-type-badge.type-multiple  { background: rgba(47,128,237,0.15);  color: var(--blue);   border: 1px solid rgba(47,128,237,0.3); }
    .quiz-type-badge.type-short     { background: rgba(74,222,128,0.15);  color: #4ade80;       border: 1px solid rgba(74,222,128,0.3); }
    .quiz-type-badge.type-subjective{ background: rgba(233,69,96,0.15);   color: var(--accent); border: 1px solid rgba(233,69,96,0.3); }

    /* ── Question Card ─────────────────────────────────────── */
    .question-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px 28px;
      margin-bottom: 24px;
    }
    .question-number {
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }
    .question-text {
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 16px;
    }
    .question-image {
      display: none;
      max-width: 100%;
      max-height: 360px;
      object-fit: contain;
      border-radius: 8px;
      margin-bottom: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
    }
    #questionImage[src]:not([src=""]) {
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── OX Options ─────────────────────────────────────── */
    .ox-options {
      display: flex;
      gap: 20px;
      justify-content: center;
      margin-bottom: 8px;
    }
    .ox-btn {
      width: 88px;
      height: 88px;
      font-size: 2.4rem;
      font-weight: 900;
      border-radius: 50%;
      border: 2px solid;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      font-family: var(--font);
    }
    .ox-btn:active { transform: scale(0.95); }
    .ox-btn-o {
      border-color: var(--blue);
      color: var(--blue);
    }
    .ox-btn-o:hover { background: rgba(47,128,237,0.15); }
    .ox-btn-o.selected {
      background: var(--blue);
      color: #fff;
      box-shadow: 0 0 20px rgba(47,128,237,0.4);
    }
    .ox-btn-x {
      border-color: var(--accent);
      color: var(--accent);
    }
    .ox-btn-x:hover { background: rgba(233,69,96,0.15); }
    .ox-btn-x.selected {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 0 20px rgba(233,69,96,0.4);
    }
    .ox-btn:disabled { opacity: 0.6; cursor: default; pointer-events: none; }

    /* ── Multiple Choice ─────────────────────────────────────── */
    .multiple-options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .multiple-btn {
      width: 100%;
      padding: 14px 18px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      font-size: 0.95rem;
      font-family: var(--font);
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .multiple-btn:hover:not(:disabled) { border-color: var(--text-muted); }
    .multiple-btn:disabled { cursor: default; }
    .multiple-btn.selected { border-color: var(--accent); }
    .multiple-btn.correct  { border-color: #4ade80; background: rgba(74,222,128,0.1); }
    .multiple-btn.wrong    { border-color: var(--accent); background: rgba(233,69,96,0.1); }
    .multiple-label {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: var(--text-muted);
    }
    .multiple-btn.selected .multiple-label { background: var(--accent); color: #fff; }
    .multiple-btn.correct  .multiple-label { background: #4ade80; color: #0d1117; }
    .multiple-btn.wrong    .multiple-label { background: var(--accent); color: #fff; }

    /* ── Text / Subjective Input ─────────────────────────────────────── */
    .text-option,
    .subjective-option {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .quiz-text-input {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font);
      box-sizing: border-box;
      transition: border-color 0.15s;
      outline: none;
    }
    .quiz-text-input:focus { border-color: var(--text-muted); }
    .quiz-textarea {
      width: 100%;
      padding: 12px 16px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
      font-family: var(--font);
      min-height: 120px;
      resize: vertical;
      box-sizing: border-box;
      transition: border-color 0.15s;
      outline: none;
    }
    .quiz-textarea:focus { border-color: var(--text-muted); }
    .quiz-submit-btn {
      align-self: flex-start;
      padding: 12px 28px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-weight: 700;
      font-size: 0.95rem;
      font-family: var(--font);
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .quiz-submit-btn:hover { opacity: 0.88; }
    .quiz-submit-btn:disabled { opacity: 0.5; cursor: default; }

    /* ── Answer Feedback ─────────────────────────────────────── */
    .answer-feedback {
      margin-top: 24px;
      padding: 20px;
      background: var(--surface2);
      border-radius: 10px;
      border: 1px solid var(--border);
      animation: fadeIn 0.25s ease;
    }
    .answer-feedback.correct { border-color: #4ade80; }
    .answer-feedback.wrong   { border-color: var(--accent); }
    .answer-feedback.subjective-reveal { border-color: var(--border); }

    @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:none; } }

    .feedback-icon {
      font-size: 2rem;
      text-align: center;
      margin-bottom: 6px;
      line-height: 1;
    }
    .feedback-text {
      text-align: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 12px;
    }
    .correct-answer-reveal {
      color: var(--text-muted);
      font-size: 0.88rem;
      text-align: center;
      line-height: 1.6;
      margin-bottom: 4px;
    }
    .correct-answer-reveal strong { color: var(--text); }
    .quiz-next-btn {
      width: 100%;
      padding: 13px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-weight: 600;
      font-size: 0.95rem;
      font-family: var(--font);
      cursor: pointer;
      margin-top: 16px;
      transition: border-color 0.15s, color 0.15s;
    }
    .quiz-next-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Result Screen ─────────────────────────────────────── */
    .result-wrap {
      padding: 40px 0;
    }
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 32px 36px;
      text-align: center;
    }
    .result-score-big {
      font-size: 4.5rem;
      font-weight: 900;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 6px;
    }
    .result-score-denom {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .result-message {
      font-size: 1.1rem;
      color: var(--text);
      font-weight: 600;
      margin-bottom: 8px;
    }
    .result-sub {
      font-size: 0.88rem;
      color: var(--text-muted);
      margin-bottom: 28px;
    }
    .result-breakdown {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-bottom: 32px;
      padding: 16px;
      background: var(--surface2);
      border-radius: 10px;
    }
    .result-stat {
      text-align: center;
    }
    .result-stat-num {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--text);
    }
    .result-stat-num.correct-num { color: #4ade80; }
    .result-stat-num.wrong-num   { color: var(--accent); }
    .result-stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .btn-back {
      display: block;
      padding: 14px;
      background: var(--accent);
      color: #fff;
      border-radius: 8px;
      font-weight: 700;
      text-decoration: none;
      font-size: 0.95rem;
      transition: opacity 0.15s;
    }
    .btn-back:hover { opacity: 0.88; }
    .btn-post-link {
      display: block;
      margin-top: 10px;
      padding: 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 8px;
      font-size: 0.88rem;
      text-decoration: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-post-link:hover { border-color: var(--text-muted); color: var(--text); }

    /* ── No questions state ─────────────────────────────────────── */
    .quiz-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
    }
    .quiz-empty p { margin-top: 10px; font-size: 0.95rem; }
  </style>
</head>
