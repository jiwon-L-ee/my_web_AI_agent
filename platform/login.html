<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-wrap {
      position: relative;
      overflow: hidden;
    }
    .login-wrap::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 80%, rgba(233,69,96,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 35% at 80% 20%, rgba(245,166,35,0.06) 0%, transparent 55%);
      pointer-events: none;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      text-align: left;
      position: relative;
      z-index: 1;
    }
    .auth-logo {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      margin-bottom: 32px;
    }
    .auth-logo-title {
      font-size: 2rem;
      font-weight: 900;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 0%, #f5a623 50%, #e94560 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
    }
    .auth-logo-sub {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.03em;
    }
    .auth-page-title {
      font-size: 1.25rem;
      font-weight: 700;
      margin-bottom: 24px;
      text-align: center;
    }
    .auth-msg {
      font-size: 0.82rem;
      margin-top: 10px;
      min-height: 18px;
      display: none;
      padding: 8px 12px;
      border-radius: 6px;
    }
    .auth-msg.error {
      display: block;
      color: #ff6b6b;
      background: rgba(255, 107, 107, 0.08);
      border: 1px solid rgba(255, 107, 107, 0.2);
    }
    .auth-msg.success {
      display: block;
      color: #4caf8a;
      background: rgba(76, 175, 138, 0.08);
      border: 1px solid rgba(76, 175, 138, 0.2);
    }
    .auth-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--text-muted);
      font-size: 0.75rem;
    }
    .auth-divider::before,
    .auth-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }
    .auth-actions { margin-top: 20px; }
    .auth-actions .btn-submit { width: 100%; }
    .auth-switch {
      text-align: center;
      margin-top: 20px;
      font-size: 0.82rem;
      color: var(--text-muted);
    }
    .auth-switch a {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
    }
    .consent-notice {
      font-size: 0.76rem;
      color: var(--text-muted);
      text-align: center;
      margin-top: 12px;
      line-height: 1.5;
    }
    .consent-link {
      color: var(--accent);
      text-decoration: underline;
      text-underline-offset: 2px;
      cursor: pointer;
      background: none;
      border: none;
      font-size: inherit;
      font-family: inherit;
      padding: 0;
    }
    .legal-modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }
    .legal-modal-overlay.open { display: flex; }
    .legal-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      width: 100%;
      max-width: 560px;
      max-height: 80vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .legal-modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
    }
    .legal-modal-header h3 { font-size: 1rem; font-weight: 700; }
    .legal-modal-close {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px; background: none;
      border: 1px solid var(--border); color: var(--text-muted);
      cursor: pointer; font-size: 1rem; line-height: 1; transition: all 0.15s;
    }
    .legal-modal-close:hover { border-color: var(--text-muted); color: var(--text); }
    .legal-modal-body { overflow-y: auto; padding: 20px; flex: 1; }
    .legal-modal-body pre {
      font-family: var(--font); font-size: 0.82rem;
      color: var(--text-muted); white-space: pre-wrap;
      word-break: normal; overflow-wrap: break-word; line-height: 1.7;
    }
    .legal-loading { text-align: center; color: var(--text-muted); font-size: 0.85rem; padding: 20px 0; }
  </style>
</head>

    </button>
  </div>

<div class="login-wrap">
  <div class="login-card">

    <!-- 로고 -->
    <div class="auth-logo">
      <svg width="44" height="56" viewBox="0 0 18 24" fill="none" aria-hidden="true">
        <defs><linearGradient id="lgCard" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs>
        <path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgCard)"/>
      </svg>
      <span class="auth-logo-title">맞불</span>
      <span class="auth-logo-sub">사소한 고집의 끝</span>
    </div>

    <div class="auth-page-title">로그인</div>

    <!-- Google 로그인 -->
    <div style="text-align:center">
      <button class="btn-google" id="googleLoginBtn" type="button" style="width:100%">
        <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
          <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85l6.1-6.1C34.46 3.14 29.48 1 24 1 14.84 1 7.04 6.34 3.33 14.03l7.1 5.52C12.15 13.28 17.62 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.52 24.5c0-1.58-.14-3.1-.4-4.57H24v8.64h12.67c-.55 2.97-2.2 5.48-4.68 7.17l7.18 5.57C43.64 37.29 46.52 31.37 46.52 24.5z"/>
          <path fill="#FBBC05" d="M10.43 28.45A14.55 14.55 0 0 1 9.5 24c0-1.55.27-3.06.74-4.45l-7.1-5.52A23.94 23.94 0 0 0 0 24c0 3.87.92 7.52 2.55 10.74l7.88-6.29z"/>
          <path fill="#34A853" d="M24 47c5.48 0 10.08-1.81 13.44-4.91l-7.18-5.57c-1.99 1.34-4.54 2.13-6.26 2.13-6.38 0-11.85-3.78-13.57-9.05l-7.88 6.29C7.04 41.66 14.84 47 24 47z"/>
        </svg>
        Google로 로그인
      </button>
      <p class="consent-notice">
        계속하면
        <button class="consent-link" id="googleTermsLink" type="button">이용약관</button>
        및
        <button class="consent-link" id="googlePrivacyLink" type="button">개인정보처리방침</button>에
        동의하는 것으로 간주됩니다.
      </p>
    </div>

    <div class="auth-divider">또는</div>

    <!-- 이메일 로그인 -->
    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="loginEmail">이메일</label>
        <input id="loginEmail" class="form-input" type="email" placeholder="example@email.com" autocomplete="email" required>
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPassword">비밀번호</label>
        <input id="loginPassword" class="form-input" type="password" placeholder="비밀번호 입력" autocomplete="current-password" required>
      </div>
      <div id="loginMsg" class="auth-msg"></div>
      <div style="text-align:right;margin-top:8px">
        <a href="forgot-password.html" style="font-size:0.8rem;color:var(--text-muted);text-decoration:underline;text-underline-offset:2px">비밀번호를 잊으셨나요?</a>
      </div>
      <div class="auth-actions">
        <button type="submit" class="btn-submit">로그인</button>
      </div>
    </form>

    <div class="auth-switch">
      계정이 없으신가요? <a id="signupLink" href="signup.html">회원가입</a>
    </div>

  </div>
</div>

<!-- 법적 모달 -->
<div class="legal-modal-overlay" id="legalModal" role="dialog" aria-modal="true">
  <div class="legal-modal">
    <div class="legal-modal-header">
      <h3 id="legalModalTitle">이용약관</h3>
      <button class="legal-modal-close" id="closeLegalModal" type="button" aria-label="닫기">✕</button>
    </div>
    <div class="legal-modal-body">
      <div class="legal-loading" id="legalLoading">불러오는 중...</div>
      <pre id="legalContent" style="display:none"></pre>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  // 이미 로그인 시 리다이렉트
  getUser().then(user => {
    if (user) {
      const next = new URLSearchParams(location.search).get('next');
      location.href = safeRedirectUrl(next, 'index.html');
    }
  });

  initAuth();

  // signup 링크에 next 파라미터 전달
  const nextParam = new URLSearchParams(location.search).get('next');
  if (nextParam) {
    document.getElementById('signupLink').href = 'signup.html?next=' + encodeURIComponent(nextParam);
  }

  // ── Google 로그인 ──
  document.getElementById('googleLoginBtn').addEventListener('click', function() {
    this.disabled = true;
    this.style.opacity = '0.7';
    signInWithGoogle().catch(() => {
      this.disabled = false;
      this.style.opacity = '';
    });
  });

  // ── 이메일 로그인 ──
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const msg = document.getElementById('loginMsg');
    msg.className = 'auth-msg';
    const btn = this.querySelector('button[type="submit"]');
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    if (!email || !password) {
      msg.textContent = '이메일과 비밀번호를 입력해주세요.';
      msg.className = 'auth-msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = '로그인 중...';
    try {
      await signInWithEmail(email, password);
      const next = new URLSearchParams(location.search).get('next');
      location.href = safeRedirectUrl(next, 'index.html');
    } catch (err) {
      msg.textContent = err.message === 'Invalid login credentials'
        ? '이메일 또는 비밀번호가 올바르지 않습니다.'
        : (err.message || '로그인에 실패했습니다. 다시 시도해주세요.');
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  });

  // ── 법적 모달 ──
  const legalModal = document.getElementById('legalModal');
  const legalTitle = document.getElementById('legalModalTitle');
  const legalContent = document.getElementById('legalContent');
  const legalLoading = document.getElementById('legalLoading');

  async function openLegal(type) {
    legalTitle.textContent = type === 'terms' ? '이용약관' : '개인정보처리방침';
    legalContent.style.display = 'none';
    legalLoading.style.display = 'block';
    legalModal.classList.add('open');
    try {
      const res = await fetch(type === 'terms' ? 'legal/terms.txt' : 'legal/privacy.txt');
      const text = await res.text();
      legalContent.textContent = text;
      legalContent.style.display = 'block';
      legalLoading.style.display = 'none';
    } catch {
      legalContent.textContent = '내용을 불러올 수 없습니다.';
      legalContent.style.display = 'block';
      legalLoading.style.display = 'none';
    }
  }

  function closeLegal() { legalModal.classList.remove('open'); }

  document.getElementById('googleTermsLink').addEventListener('click', () => openLegal('terms'));
  document.getElementById('googlePrivacyLink').addEventListener('click', () => openLegal('privacy'));
  document.getElementById('closeLegalModal').addEventListener('click', closeLegal);
  legalModal.addEventListener('click', e => { if (e.target === legalModal) closeLegal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLegal(); });

  (function() {
    if (localStorage.getItem('matbul-theme') === 'light') document.body.classList.add('light-mode');
    document.getElementById('themeToggle').addEventListener('click', function() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('matbul-theme', isLight ? 'light' : 'dark');
    });
  })();
</script>
