<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로그인 | 맞불</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="logo-flame-sm" width="18" height="24" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgNav" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgNav)"/></svg>
      <span class="logo-wordmark">맞불</span>
    </a>
    <div class="nav-center">
      <a href="index.html" class="nav-link" data-cat="밸런스게임">홈</a>
      <a href="index.html?cat=토론" class="nav-link" data-cat="토론">토론</a>
      <a href="index.html?cat=퀴즈" class="nav-link" data-cat="퀴즈">퀴즈</a>
      <a href="index.html?cat=커뮤니티" class="nav-link" data-cat="커뮤니티">커뮤니티</a>
      <a href="index.html?cat=정보" class="nav-link" data-cat="정보">정보</a>
    </div>
    <div class="nav-auth" id="navAuth"></div>
  </div>
</nav>

<div class="login-wrap">
  <div class="login-card">
    <div style="margin-bottom:16px;display:flex;flex-direction:column;align-items:center;gap:6px">
      <svg width="44" height="56" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgCard" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgCard)"/></svg>
      <span style="font-size:1.9rem;font-weight:900;letter-spacing:-0.03em;background:linear-gradient(135deg,#fff 0%,#f5a623 55%,#e94560 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1">맞불</span>
    </div>
    <p>구글 계정으로 로그인하고<br>논쟁의 세계에 참여해보세요.</p>
    <button class="btn-google" id="googleLoginBtn">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <path fill="#EA4335" d="M24 9.5c3.14 0 5.95 1.08 8.17 2.85l6.1-6.1C34.46 3.14 29.48 1 24 1 14.84 1 7.04 6.34 3.33 14.03l7.1 5.52C12.15 13.28 17.62 9.5 24 9.5z"/>
        <path fill="#4285F4" d="M46.52 24.5c0-1.58-.14-3.1-.4-4.57H24v8.64h12.67c-.55 2.97-2.2 5.48-4.68 7.17l7.18 5.57C43.64 37.29 46.52 31.37 46.52 24.5z"/>
        <path fill="#FBBC05" d="M10.43 28.45A14.55 14.55 0 0 1 9.5 24c0-1.55.27-3.06.74-4.45l-7.1-5.52A23.94 23.94 0 0 0 0 24c0 3.87.92 7.52 2.55 10.74l7.88-6.29z"/>
        <path fill="#34A853" d="M24 47c5.48 0 10.08-1.81 13.44-4.91l-7.18-5.57c-1.99 1.34-4.54 2.13-6.26 2.13-6.38 0-11.85-3.78-13.57-9.05l-7.88 6.29C7.04 41.66 14.84 47 24 47z"/>
      </svg>
      Google로 로그인
    </button>

    <p style="margin-top:16px;font-size:0.78rem;color:var(--text-muted)">
      로그인 시 <a href="#" style="color:var(--accent)">이용약관</a>에 동의하는 것으로 간주됩니다.
    </p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script>
  // If already logged in, redirect (safeRedirectUrl로 오픈 리다이렉트 방지)
  getUser().then(user => {
    if (user) {
      const next = new URLSearchParams(location.search).get('next');
      location.href = safeRedirectUrl(next, 'index.html');
    }
  });

  document.getElementById('googleLoginBtn').addEventListener('click', async () => {
    const btn = document.getElementById('googleLoginBtn');
    btn.disabled = true;
    btn.style.opacity = '0.7';
    try {
      await signInWithGoogle();
    } catch {
      btn.disabled = false;
      btn.style.opacity = '';
    }
  });
</script>
</body>
</html>
