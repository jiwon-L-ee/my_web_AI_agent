<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>커뮤니티 글 작성 — 맞불</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .cc-editor-wrap { position: relative; }

    .cc-editor {
      width: 100%; min-height: 260px; box-sizing: border-box;
      padding: 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font); font-size: 0.93rem;
      line-height: 1.75; outline: none; word-break: break-word;
      transition: border-color 0.15s;
    }
    .cc-editor:focus { border-color: var(--text-muted); }
    .cc-editor.drag-over { border-color: var(--accent); border-style: dashed; }
    .cc-editor:empty::before {
      content: attr(data-placeholder);
      color: var(--text-muted); pointer-events: none; display: block;
    }
    .cc-editor img {
      max-width: 100%; max-height: 420px; display: block;
      margin: 10px 0; border-radius: 8px; border: 1px solid var(--border);
      object-fit: contain; cursor: pointer;
    }
    .cc-editor img.img-sel {
      outline: 2px solid var(--accent); outline-offset: 2px;
    }

    /* 이미지 위에 뜨는 삭제 버튼 (body에 붙음) */
    .img-float-del {
      position: fixed; z-index: 9999;
      width: 28px; height: 28px;
      background: rgba(0,0,0,0.7); border: none; border-radius: 50%;
      color: #fff; font-size: 1.1rem; cursor: pointer;
      display: none; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .img-float-del:hover { background: var(--accent); }
    .img-float-del.visible { display: flex; }

    /* 툴바 */
    .editor-toolbar {
      display: flex; gap: 8px; margin-top: 6px;
    }
    .btn-editor-tool {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 12px; background: var(--surface2);
      border: 1px dashed var(--border); border-radius: 8px;
      color: var(--text-muted); font-family: var(--font); font-size: 0.8rem;
      cursor: pointer; transition: border-color 0.15s, color 0.15s;
      user-select: none;
    }
    .btn-editor-tool:hover { border-color: var(--accent); color: var(--accent); }
    .editor-hint { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="nav-logo">
      <svg class="logo-flame-sm" width="18" height="24" viewBox="0 0 18 24" fill="none" aria-hidden="true"><defs><linearGradient id="lgNav" x1="9" y1="24" x2="9" y2="0" gradientUnits="userSpaceOnUse"><stop offset="0%" stop-color="#e94560"/><stop offset="55%" stop-color="#f5a623"/><stop offset="100%" stop-color="#ffe170"/></linearGradient></defs><path d="M9 23C4 21 1 15 3 9C4.5 5 7 2 7 0C9 3 9 7 8 10C10 7 12 3 11 1C15 5 16 13 14 17C13 20 11 23 9 23Z" fill="url(#lgNav)"/></svg>
      <span class="logo-wordmark">맞불</span>

    <div class="nav-center">
      <a href="index.html" class="nav-link" data-cat="밸런스게임">홈</a>
      <a href="index.html?cat=토론" class="nav-link" data-cat="토론">토론</a>

      <svg class="theme-icon-dark" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      <svg class="theme-icon-light" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>

<!-- floating 삭제 버튼 (body에 직접 붙임) -->
<button type="button" id="imgFloatDel" class="img-float-del" aria-label="이미지 삭제">×</button>

<div class="page create-page">
  <form class="form-card" id="communityCreateForm" onsubmit="return false">
    <h1>커뮤니티 글 작성</h1>

    <div class="form-group">
      <label class="form-label" for="ccTitle">제목 *</label>
      <input id="ccTitle" class="form-input" type="text" placeholder="제목을 입력하세요" maxlength="100" autocomplete="off">
    </div>

    <div class="form-group">
      <label class="form-label">내용</label>
      <div class="cc-editor-wrap">
        <div id="ccEditor" class="cc-editor"
             contenteditable="true"
             data-placeholder="내용을 자유롭게 작성해 주세요..."></div>
      </div>
      <div class="editor-toolbar">
        <label for="ccImgInput" class="btn-editor-tool">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
          사진 추가
        </label>
        <input type="file" id="ccImgInput" accept="image/*" multiple style="display:none">
      </div>
      <p class="editor-hint">이미지를 에디터에 끌어다 놓거나 클립보드에서 붙여넣기 가능 · 이미지 클릭 후 × 로 삭제</p>
    </div>

    <div class="create-footer" style="margin-top:28px">
      <div class="terms-section">
        <label class="terms-item">
          <input type="checkbox" id="ccTerms1">
          커뮤니티 가이드라인을 준수하며, 허위·혐오·불법 콘텐츠를 게시하지 않겠습니다.
        </label>
        <label class="terms-item">
          <input type="checkbox" id="ccTerms2">
          타인의 저작권을 침해하지 않는 콘텐츠임을 확인합니다.
        </label>
      </div>
      <div class="form-actions">
        <button type="button" id="ccCancelBtn" class="btn-cancel">취소</button>
        <button type="button" id="ccSubmitBtn" class="btn-submit" disabled>게시하기</button>
      </div>
    </div>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/notifications.js"></script>
<script src="js/community-create.js"></script>
<script>
  (function() {
    if (localStorage.getItem('matbul-theme') === 'light') document.body.classList.add('light-mode');
    document.getElementById('themeToggle').addEventListener('click', function() {
      const isLight = document.body.classList.toggle('light-mode');
      localStorage.setItem('matbul-theme', isLight ? 'light' : 'dark');
    });
  })();
</script>
</body>
</html>
