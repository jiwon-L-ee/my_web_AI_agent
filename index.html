<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>얼굴상 분석기</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>얼굴상 분석기</h1>
      <p class="subtitle">AI가 당신의 얼굴상을 분석해드립니다</p>
    </header>

    <main>
      <div class="upload-section">
        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">📷</div>
          <p class="upload-text">사진을 드래그하거나 클릭하여 업로드</p>
          <p class="upload-hint">JPG, PNG, WEBP 지원</p>
          <input type="file" id="fileInput" accept="image/*" hidden />
        </div>
        <div class="preview-area" id="previewArea" style="display:none;">
          <img id="previewImg" src="" alt="미리보기" />
          <button class="btn-reset" id="resetBtn">다른 사진 선택</button>
        </div>
      </div>

      <button class="btn-analyze" id="analyzeBtn" disabled>분석하기</button>

      <div class="result-section" id="resultSection" style="display:none;">
        <div class="result-card">
          <div class="result-label">판정 결과</div>
          <div class="result-class" id="resultClass"></div>
          <div class="confidence-bar-wrap">
            <div class="confidence-bar" id="confidenceBar"></div>
          </div>
          <div class="confidence-text" id="confidenceText"></div>
          <div class="result-description" id="resultDescription"></div>
          <div class="all-scores" id="allScores"></div>
        </div>
      </div>

      <div class="loading" id="loading" style="display:none;">
        <div class="spinner"></div>
        <p>분석 중...</p>
      </div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
